services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ./src/ui
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

# Uwaga: orchestrator i agenci Claude Code działają na hoście,
# nie w kontenerze — wymagają dostępu do claude CLI i ~/.claude
# MCP db_server jest uruchamiany przez claude jako subprocess (stdio)
